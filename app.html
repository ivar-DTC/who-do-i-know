<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woodstock DTC · Neighbor Network · Review</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #497AD2;
    --blue: #2a4494;
    --gold: #FFC13A;
    --cream: #EFF5FB;
    --sage: #7a9e7e;
    --red: #c0392b;
    --light: #EFF5FB;
    --mid: #e8e2d6;
    --text: #2c2c2c;
    --muted: #7a7468;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--navy);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-img { height: 56px; width: auto; }
  .logo-text {
    font-family: 'Playfair Display', serif;
    color: white; font-size: 1.2rem; font-weight: 700; line-height: 1.2;
  }
  .logo-text span {
    display: block; font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    color: #e2e8f0; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .who {
    font-size: 0.8rem; color: #e2e8f0; letter-spacing: 0.03em;
    display: flex; align-items: center; gap: 8px;
  }
  .who strong { color: white; }
  .btn-ghost {
    padding: 6px 14px; background: transparent; color: var(--gold);
    border: 1px solid var(--gold); border-radius: 3px;
    font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
  }
  .btn-ghost:hover { background: var(--gold); color: var(--blue); }
  .btn-ghost:disabled { opacity: 0.4; cursor: default; }

  /* TABS */
  .tabs {
    display: flex; gap: 0; background: white;
    border-bottom: 1px solid var(--mid);
    padding: 0 24px;
    position: sticky; top: 0; z-index: 20;
  }
  .tab {
    appearance: none; background: none; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
    color: var(--muted); padding: 16px 20px; cursor: pointer;
    border-bottom: 3px solid transparent; transition: all 0.18s;
    letter-spacing: 0.02em;
  }
  .tab:hover { color: var(--blue); }
  .tab.active { color: var(--navy); border-bottom-color: var(--gold); }

  main {
    flex: 1; padding: 32px 24px 64px;
    max-width: 640px; width: 100%; margin: 0 auto;
  }

  /* GATE (member select) */
  .gate { animation: fadeUp 0.4s ease both; padding-top: 24px; }
  .gate h1 {
    font-family: 'Playfair Display', serif; font-size: 1.9rem;
    color: var(--navy); margin-bottom: 8px; line-height: 1.2;
  }
  .gate p { color: var(--muted); font-size: 0.92rem; line-height: 1.6; margin-bottom: 28px; }
  .field-label {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); font-weight: 500; margin-bottom: 10px; display: block;
  }
  select, input[type="text"] {
    width: 100%; padding: 14px 16px; font-family: 'DM Sans', sans-serif;
    font-size: 1rem; color: var(--text); background: white;
    border: 1px solid var(--mid); border-radius: 4px; outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input[type="text"]:focus { border-color: var(--navy); }
  .gate-actions { margin-top: 24px; display: flex; flex-direction: column; gap: 12px; }
  .add-row { display: flex; gap: 10px; }
  .add-row input { flex: 1; }

  .btn-primary {
    padding: 14px 24px; background: var(--navy); color: white; border: none;
    border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 1rem;
    font-weight: 500; cursor: pointer; transition: background 0.18s;
    letter-spacing: 0.02em; width: 100%;
  }
  .btn-primary:hover { background: var(--blue); }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }
  .btn-secondary {
    padding: 12px 20px; background: white; color: var(--navy);
    border: 1px solid var(--navy); border-radius: 4px;
    font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 500;
    cursor: pointer; transition: all 0.18s; width: 100%;
  }
  .btn-secondary:hover { background: var(--cream); }

  /* QUEUE PROGRESS */
  .queue-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; gap: 12px;
  }
  .queue-labels { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .road-name {
    font-family: 'Playfair Display', serif; font-size: 1.05rem;
    color: var(--navy); font-weight: 700; line-height: 1.1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .queue-count { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.02em; }
  .queue-count strong { color: var(--navy); font-weight: 700; }
  .qbar-track {
    height: 6px; background: var(--mid); border-radius: 3px;
    overflow: hidden; flex: 1; margin-left: 16px; max-width: 200px;
  }
  .qbar-fill { height: 100%; background: var(--sage); border-radius: 3px; transition: width 0.4s ease; }

  /* QUEUE CONTROLS — undo + pick a road */
  .queue-controls { display: flex; gap: 8px; margin: -8px 0 16px; }
  .btn-chip {
    appearance: none; background: white; border: 1px solid var(--mid);
    border-radius: 999px; padding: 6px 14px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500;
    color: var(--navy); transition: all 0.15s; letter-spacing: 0.02em;
  }
  .btn-chip:hover { background: var(--cream); border-color: var(--navy); }
  .btn-chip:disabled { opacity: 0.4; cursor: default; color: var(--muted); }
  .btn-chip:disabled:hover { background: white; border-color: var(--mid); }

  /* ROAD PICKER */
  .picker { animation: fadeUp 0.35s ease both; }
  .picker-head h1 {
    font-family: 'Playfair Display', serif; font-size: 1.7rem;
    color: var(--navy); margin-bottom: 8px; line-height: 1.2;
  }
  .picker-head p { color: var(--muted); font-size: 0.92rem; line-height: 1.6; margin-bottom: 22px; }
  .road-pick-list { display: flex; flex-direction: column; gap: 8px; }
  .road-pick-row {
    appearance: none; background: white; border: 1px solid var(--mid);
    border-radius: 6px; padding: 16px 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    font-family: 'DM Sans', sans-serif; text-align: left; transition: all 0.15s;
    box-shadow: 0 3px 12px rgba(26,39,68,0.05);
  }
  .road-pick-row:hover { border-color: var(--navy); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(26,39,68,0.1); }
  .road-pick-name { font-size: 1rem; font-weight: 500; color: var(--text); }
  .road-pick-count {
    font-size: 0.78rem; color: var(--navy); font-weight: 700; flex-shrink: 0;
    background: var(--cream); padding: 4px 10px; border-radius: 999px;
  }
  .picker-empty { color: var(--muted); text-align: center; padding: 32px 0; font-size: 0.92rem; }

  /* TRANSIENT ROAD-COMPLETE BANNER — fixed overlay, never shifts layout */
  .road-banner-overlay {
    position: fixed; left: 50%; top: 76px;
    transform: translateX(-50%) translateY(-20px);
    background: var(--sage); color: white;
    padding: 12px 22px; border-radius: 999px;
    font-size: 0.9rem; font-weight: 500; text-align: center;
    box-shadow: 0 8px 28px rgba(26,39,68,0.28);
    z-index: 60; opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
    max-width: calc(100vw - 32px);
  }
  .road-banner-overlay.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .road-banner-overlay.hide { opacity: 0; transform: translateX(-50%) translateY(-20px); }

  /* PERSISTENT "DONE FOR NOW" */
  .done-footer { text-align: center; margin-top: 22px; }
  .btn-text {
    appearance: none; background: none; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
    color: var(--muted); cursor: pointer; padding: 8px 16px;
    text-decoration: underline; text-underline-offset: 3px; letter-spacing: 0.02em;
  }
  .btn-text:hover { color: var(--navy); }

  /* HOUSEHOLD CARD — fixed height so the action buttons never move
     between cards (members list scrolls internally if long). */
  .card {
    background: white; border: 1px solid var(--mid); border-radius: 6px;
    box-shadow: 0 6px 22px rgba(26,39,68,0.08);
    overflow: hidden; animation: cardIn 0.32s ease both;
    height: 64vh; max-height: 560px; min-height: 420px;
    display: flex; flex-direction: column;
  }
  .card-head {
    padding: 24px 28px 20px; border-bottom: 1px solid var(--cream);
    background: linear-gradient(180deg, #fff 0%, var(--cream) 140%);
    flex-shrink: 0;
  }
  .card-eyebrow {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted); font-weight: 500; margin-bottom: 8px;
  }
  .card-surname {
    font-family: 'Playfair Display', serif; font-size: 1.7rem;
    color: var(--navy); line-height: 1.15; margin-bottom: 6px;
  }
  .card-address { font-size: 0.92rem; color: var(--text); }
  .card-road { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

  /* members list fills the flexible middle and scrolls when long */
  .members-list { padding: 8px 28px; flex: 1 1 auto; overflow-y: auto; min-height: 0; }
  .member-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--cream); gap: 12px;
  }
  .member-row:last-child { border-bottom: none; }
  .member-id { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
  .member-name { font-size: 1.02rem; font-weight: 500; color: var(--text); }
  .member-age { font-size: 0.82rem; color: var(--muted); flex-shrink: 0; }
  .member-prior {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 2px 8px; border-radius: 10px; font-weight: 700; flex-shrink: 0;
  }
  .prior-Y { background: #d4edda; color: #155724; }
  .prior-KO { background: #fff3cd; color: #856404; }
  .prior-N { background: #f8d7da; color: #721c24; }

  /* YKN buttons (stage 2) */
  .ykn { display: flex; gap: 6px; flex-shrink: 0; }
  .ykn button {
    appearance: none; border: 1.5px solid var(--mid); background: white;
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.8rem;
    color: var(--muted); border-radius: 5px; cursor: pointer;
    padding: 8px 0; width: 46px; transition: all 0.14s; letter-spacing: 0.02em;
  }
  .ykn button:hover { border-color: var(--navy); color: var(--navy); }
  .ykn button.sel-Y { background: var(--sage); border-color: var(--sage); color: white; }
  .ykn button.sel-KO { background: var(--gold); border-color: var(--gold); color: var(--blue); }
  .ykn button.sel-N { background: var(--red); border-color: var(--red); color: white; }

  .card-actions { padding: 20px 28px 24px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; border-top: 1px solid var(--cream); background: white; }
  .card-note {
    font-size: 0.78rem; color: var(--muted); text-align: center;
    line-height: 1.5; margin-top: 2px;
  }

  /* CONFIRM (big household) */
  .confirm-banner {
    margin: 0 28px 4px; padding: 12px 16px; background: #fff3cd;
    border: 1px solid var(--gold); border-radius: 5px;
    font-size: 0.85rem; color: #856404; line-height: 1.5;
  }

  /* DONE / EMPTY */
  .panel {
    background: white; border: 1px solid var(--mid); border-radius: 6px;
    padding: 48px 32px; text-align: center;
    box-shadow: 0 6px 22px rgba(26,39,68,0.08); animation: fadeUp 0.4s ease both;
  }
  .panel h2 {
    font-family: 'Playfair Display', serif; font-size: 1.6rem;
    color: var(--navy); margin-bottom: 10px;
  }
  .panel p { color: var(--muted); font-size: 0.92rem; line-height: 1.6; max-width: 400px; margin: 0 auto 8px; }
  .panel .big {
    font-family: 'Playfair Display', serif; font-size: 3rem;
    color: var(--sage); line-height: 1; margin-bottom: 12px;
  }

  /* SEARCH (I met someone) */
  .met-intro { margin-bottom: 20px; }
  .met-intro h1 {
    font-family: 'Playfair Display', serif; font-size: 1.7rem;
    color: var(--navy); margin-bottom: 8px; line-height: 1.2;
  }
  .met-intro p { color: var(--muted); font-size: 0.92rem; line-height: 1.6; }
  .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .search-row input { flex: 1; }
  .search-row button { width: auto; padding-left: 24px; padding-right: 24px; flex-shrink: 0; }

  .result {
    background: white; border: 1px solid var(--mid); border-radius: 6px;
    padding: 16px 18px; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px; box-shadow: 0 3px 12px rgba(26,39,68,0.05);
    animation: cardIn 0.24s ease both;
  }
  .result-id { min-width: 0; }
  .result-name { font-size: 1rem; font-weight: 500; color: var(--text); }
  .result-meta { font-size: 0.8rem; color: var(--muted); margin-top: 3px; }
  .search-empty { text-align: center; color: var(--muted); padding: 32px 0; font-size: 0.9rem; }

  /* TOAST */
  .toast-wrap {
    position: fixed; left: 0; right: 0; bottom: 24px;
    display: flex; justify-content: center; pointer-events: none; z-index: 50; padding: 0 16px;
  }
  .toast {
    background: var(--blue); color: white; padding: 12px 22px;
    border-radius: 6px; font-size: 0.88rem; font-weight: 500;
    box-shadow: 0 8px 28px rgba(26,39,68,0.28);
    animation: toastIn 0.24s ease both; display: flex; align-items: center; gap: 12px;
    pointer-events: auto;
  }
  .toast .undo {
    background: none; border: none; color: var(--gold); font-weight: 700;
    cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    text-decoration: underline; padding: 0;
  }

  /* LOADING / ERROR */
  .loading-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 72px 24px; gap: 16px; color: var(--muted);
  }
  .spinner {
    width: 34px; height: 34px; border: 3px solid var(--mid);
    border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  .error-state { text-align: center; padding: 48px 24px; color: var(--muted); }
  .error-state p:first-child { color: var(--text); margin-bottom: 6px; }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    header { padding: 12px 16px; }
    .tabs { padding: 0 8px; }
    .tab { padding: 14px 14px; font-size: 0.82rem; }
    main { padding: 20px 14px 56px; }
    .logo-img { height: 42px; }
    .logo-text { font-size: 1rem; }
    .card-head { padding: 20px 20px 16px; }
    .members-list { padding: 4px 20px; }
    .card-actions { padding: 16px 20px 20px; }
    .card-surname { font-size: 1.45rem; }
    .ykn button { width: 42px; }
    .search-row { flex-direction: column; }
    .search-row button { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="https://ivar-dtc.github.io/who-do-i-know/WDTC-logo.png" alt="Woodstock DTC" class="logo-img" />
    <div class="logo-text">
      Woodstock DTC
      <span>Neighbor Network · Review</span>
    </div>
  </div>
  <div class="header-right" id="header-right"></div>
</header>

<nav class="tabs hidden" id="tabs">
  <button class="tab active" id="tab-review" onclick="switchTab('review')">Review households</button>
  <button class="tab" id="tab-met" onclick="switchTab('met')">Update individual response</button>
</nav>

<main id="main"></main>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8rGdGVIqUXXQx8uojA6VZ_74HkK0eHwvZB8Lz9hIU2_JXORFw6UnY5HbP2eQUgLxv/exec";

// ---------- state ----------
let MEMBER = null;
let allMembers = [];
let queue = [];
let qTotal = 0;        // total households this session started with
let qIndex = 0;        // households resolved this session
let stage = 1;         // 1 = household card, 2 = individual review
let stage2Answers = {}; // vanid -> "Y"|"KO"|"N"
let activeTab = 'review';

// ---------- road chapters ----------
// roads: [{ name, households:[...], total, done }]
let roads = [];
let roadIndex = 0;     // which road we're on
let inRoadIndex = 0;   // which household within the current road
let showingRoadDone = false; // true when displaying a road-complete card

// ---------- net helpers ----------
async function apiGet(params) {
  const url = APPS_SCRIPT_URL + "?" + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}
// Apps Script web apps reject custom Content-Type preflight; send text/plain.
async function apiPost(body) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(body)
  });
  return res.json();
}

// ---------- per-road write buffer (optimistic UI + batching) ----------
// Answers accumulate in a buffer as the volunteer clicks through a road,
// then flush as ONE batchWrite POST when the road completes (or on "Done
// for now" / page unload). This collapses dozens of slow Apps Script
// round-trips into one per road, so there's almost nothing in flight to
// lose if the tab closes.
let writeBuffer = [];       // [{voterId, answer}] pending flush
let writeChain = Promise.resolve(); // serializes flushes
let failedWrites = 0;

// Add answers to the buffer (does NOT hit the network).
function bufferWrite(voterId, answer) {
  writeBuffer.push({ voterId, answer });
}
function bufferWriteMany(entries) {
  entries.forEach(e => writeBuffer.push(e));
}

// ---------- undo stack (current road only) ----------
// Each committed household pushes a snapshot so rapid mis-clicks can be
// walked back. Undo is scoped to the CURRENT road: once a road flushes at
// its boundary, the stack is cleared (those answers are already sent).
let undoStack = []; // [{ roadIndex, inRoadIndex, vanids:[...], priorStates:[{vanid,answered,priorAnswer}] }]

function snapshotHousehold(hh, affectedVanids) {
  return {
    roadIndex,
    inRoadIndex,
    vanids: affectedVanids.slice(),
    priorStates: hh.members.map(m => ({ vanid: m.vanid, answered: m.answered, priorAnswer: m.priorAnswer }))
  };
}

function undoLast() {
  if (undoStack.length === 0) return;
  const snap = undoStack.pop();

  // Remove this household's entries from the buffer (match by voterId).
  // Only the trailing entries belong to it, but filtering by the snapshot's
  // vanids is safe because each voter appears at most once per road pass.
  const removeSet = {};
  snap.vanids.forEach(v => removeSet[v] = true);
  writeBuffer = writeBuffer.filter(e => !removeSet[e.vanid]);

  // Step the queue position back to that household.
  roadIndex = snap.roadIndex;
  inRoadIndex = snap.inRoadIndex;
  const road = currentRoad();
  if (road) road.done = Math.max(0, road.done - 1);
  qIndex = Math.max(0, qIndex - 1);
  stage = 1;
  stage2Answers = {};

  // Restore each member's prior answered/priorAnswer state.
  const hh = currentHousehold();
  if (hh) {
    const byId = {};
    snap.priorStates.forEach(p => byId[p.vanid] = p);
    hh.members.forEach(m => {
      const p = byId[m.vanid];
      if (p) { m.answered = p.answered; m.priorAnswer = p.priorAnswer; }
    });
  }

  toast("Undone");
  renderReview();
}

// True if there's unsent work (used by the unload guard + saving screen).
function hasPendingWrites() {
  return writeBuffer.length > 0 || flushInFlight;
}

let flushInFlight = false;

// Flush the current buffer as a single batchWrite. Returns a promise that
// resolves when the network round-trip finishes. Safe to call with an
// empty buffer (resolves immediately). Failed entries are re-buffered and
// surfaced so nothing is silently dropped.
function flushBuffer() {
  if (writeBuffer.length === 0) return Promise.resolve();
  const batch = writeBuffer;
  writeBuffer = [];
  flushInFlight = true;
  writeChain = writeChain.then(async () => {
    try {
      const r = await apiPost({ action: "batchWrite", memberName: MEMBER, answers: batch });
      if (!r || !r.success) throw new Error((r && r.error) || "batch write failed");
    } catch (err) {
      // put them back so they can be retried, and warn
      writeBuffer = batch.concat(writeBuffer);
      failedWrites += batch.length;
      flagFailedWrites();
    } finally {
      flushInFlight = false;
    }
  });
  return writeChain;
}

function flagFailedWrites() {
  // persistent (no auto-dismiss) warning the volunteer can't miss
  const wrap = document.getElementById('toast-wrap');
  wrap.innerHTML = "";
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = 'var(--red)';
  const span = document.createElement('span');
  span.textContent = `${failedWrites} ${failedWrites === 1 ? 'answer' : 'answers'} didn't save yet`;
  t.appendChild(span);
  const u = document.createElement('button');
  u.className = 'undo';
  u.textContent = 'Retry';
  u.onclick = () => { failedWrites = 0; wrap.innerHTML = ""; flushBuffer(); };
  t.appendChild(u);
  wrap.appendChild(t);
  clearTimeout(toastTimer);
}

// ---------- unload guard (A) ----------
// If there's unsent work, warn before the tab closes / navigates away.
window.addEventListener('beforeunload', (e) => {
  if (hasPendingWrites()) {
    e.preventDefault();
    e.returnValue = ''; // triggers the browser's native confirm dialog
    return '';
  }
});

// ---------- toast ----------
let toastTimer = null;
function toast(msg, undoFn) {
  const wrap = document.getElementById('toast-wrap');
  wrap.innerHTML = "";
  const t = document.createElement('div');
  t.className = 'toast';
  const span = document.createElement('span');
  span.textContent = msg;
  t.appendChild(span);
  if (undoFn) {
    const u = document.createElement('button');
    u.className = 'undo';
    u.textContent = 'Undo';
    u.onclick = () => { wrap.innerHTML = ""; clearTimeout(toastTimer); undoFn(); };
    t.appendChild(u);
  }
  wrap.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { wrap.innerHTML = ""; }, undoFn ? 5000 : 2600);
}

// ---------- escape ----------
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ============================================================
// GATE — pick who you are

function chooseMember() {

async function addMember() {

// ============================================================
// SESSION — load queue
// ============================================================
function renderHeaderRight() {
  document.getElementById('header-right').innerHTML = `
    <span class="who">Reviewing as <strong>${esc(MEMBER)}</strong></span>
    <button class="btn-ghost" onclick="switchMember()">Switch</button>
  `;
}

function switchMember() {
  MEMBER = null; queue = []; qTotal = 0; qIndex = 0; stage = 1; stage2Answers = {};
  roads = []; roadIndex = 0; inRoadIndex = 0; showingRoadDone = false;
  undoStack = [];
  showGate();
}

async function startSession() {
  renderHeaderRight();
  document.getElementById('tabs').classList.remove('hidden');
  switchTab('review');
}

async function loadQueue() {
  // Flush any buffered work from a previous road/session before reloading,
  // so a "Keep reviewing" / "Check for more" can't drop mid-road answers.
  if (hasPendingWrites()) { flushBuffer(); await writeChain; }
  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Finding your households…</span></div>`;
  let data;
  try { data = await apiGet({ action: "householdQueue", member: MEMBER }); }
  catch (err) { return showError("Couldn't load your households. Try again.", loadQueue); }
  if (!data.success) return showError(data.error || "Couldn't load your households.", loadQueue);

  const households = data.households || [];
  qTotal = households.length;
  qIndex = 0;
  stage = 1;
  stage2Answers = {};
  undoStack = [];

  // Group into road chapters, preserving backend order (which is now
  // road-sorted, so each road arrives as one contiguous run).
  roads = [];
  let current = null;
  households.forEach(hh => {
    if (!current || current.name !== hh.road) {
      current = { name: hh.road, households: [], total: 0, done: 0 };
      roads.push(current);
    }
    current.households.push(hh);
    current.total++;
  });
  roadIndex = 0;
  inRoadIndex = 0;
  showingRoadDone = false;
  renderReview();
}

// current household helper
function currentRoad() { return roads[roadIndex] || null; }
function currentHousehold() {
  const r = currentRoad();
  return r ? r.households[inRoadIndex] || null : null;
}

// Shared header for both review stages: road label, progress, and the
// undo / pick-a-road controls.
function queueTopHtml(road) {
  const roadPct = road && road.total > 0 ? Math.round((road.done / road.total) * 100) : 0;
  const canUndo = undoStack.length > 0;
  return `
    <div class="queue-top">
      <div class="queue-labels">
        <span class="road-name">${esc(road ? road.name : '')}</span>
        <span class="queue-count"><strong>${inRoadIndex + 1}</strong> of ${road ? road.total : 0} · road ${roadIndex + 1} of ${roads.length}</span>
      </div>
      <div class="qbar-track"><div class="qbar-fill" style="width:${roadPct}%"></div></div>
    </div>
    <div class="queue-controls">
      <button class="btn-chip" ${canUndo ? '' : 'disabled'} onclick="undoLast()">↶ Undo</button>
      <button class="btn-chip" onclick="openRoadPicker()">Pick a road</button>
    </div>`;
}

// ============================================================
// REVIEW — household card, organized by road chapter
// ============================================================
function renderReview() {
  if (activeTab !== 'review') return;
  const main = document.getElementById('main');

  // All roads exhausted → session complete / caught up
  if (roadIndex >= roads.length) {
    if (qTotal === 0) {
      main.innerHTML = `
        <div class="panel">
          <h2>All caught up</h2>
          <p>You've reviewed every household in your queue. When new neighbors are added — or when you meet someone new — they'll show up here.</p>
          <div style="margin-top:24px;">
            <button class="btn-secondary" onclick="switchTab('met')">Update an individual response →</button>
          </div>
        </div>`;
    } else {
      main.innerHTML = `
        <div class="panel">
          <div class="big">${qTotal}</div>
          <h2>All roads done</h2>
          <p>You worked through ${roads.length} ${roads.length === 1 ? 'road' : 'roads'} and ${qTotal} ${qTotal === 1 ? 'household' : 'households'}. Thank you — this is exactly how we map Woodstock, one neighbor at a time.</p>
          <div style="margin-top:24px;display:flex;flex-direction:column;gap:10px;">
            <a class="btn-primary" href="index.html" style="text-decoration:none;text-align:center;">See overall progress →</a>
            <button class="btn-secondary" onclick="loadQueue()">Check for more</button>
            <button class="btn-secondary" onclick="switchTab('met')">Update an individual response →</button>
          </div>
        </div>`;
    }
    return;
  }

  const road = currentRoad();

  const hh = currentHousehold();
  if (!hh) { // safety: empty road, skip forward
    roadIndex++; inRoadIndex = 0; renderReview(); return;
  }
  stage2Answers = {};

  // Transient completion banner — fixed overlay, does NOT shift the card
  if (pendingBanner) {
    showRoadBannerOverlay(pendingBanner.name, pendingBanner.total, road.name);
    pendingBanner = null;
  }

  const top = queueTopHtml(road);

  const memberRows = hh.members.map(m => {
    const age = (m.age || m.age === 0) ? `<span class="member-age">${m.age}</span>` : '';
    const prior = m.priorAnswer ? `<span class="member-prior prior-${m.priorAnswer}">${priorLabel(m.priorAnswer)}</span>` : '';
    return `
      <div class="member-row">
        <div class="member-id">
          <span class="member-name">${esc(m.first)} ${esc(m.last)}</span>
          ${age}
        </div>
        ${prior}
      </div>`;
  }).join('');

  const confirmBanner = hh.needsConfirm
    ? `<div class="confirm-banner">This is a large household (${hh.size} people) — likely a dorm or shared address. Marking "don't know" will mark the unreviewed people as not known.</div>`
    : '';

  const hasPrior = hh.members.some(m => m.answered);
  const knowLabel = hasPrior ? "I know someone else here" : "I know someone here";
  const dontKnowLabel = hasPrior ? "I don't know anyone else here" : "Don't know anyone here";
  const actionNote = hasPrior
    ? `"I don't know anyone else here" marks everyone you haven't reviewed yet as not known, and moves you on. Your earlier answers stay as they are.`
    : `"Don't know anyone here" records that none of these neighbors are familiar, and moves you on.`;

  main.innerHTML = `
    ${top}
    <div class="card">
      <div class="card-head">
        <div class="card-eyebrow">Household</div>
        <div class="card-surname">${esc(hh.surnameLabel)}</div>
        <div class="card-address">${esc(hh.address)}</div>
      </div>
      ${confirmBanner}
      <div class="members-list">${memberRows}</div>
      <div class="card-actions">
        <button class="btn-secondary" onclick="knowSomeone()">${knowLabel}</button>
        <button class="btn-primary" onclick="dontKnowAnyone()">${dontKnowLabel}</button>
        <div class="card-note">${actionNote}</div>
      </div>
    </div>
    <div class="done-footer">
      <button class="btn-text" onclick="doneForNow()">Done for now</button>
    </div>
  `;
}

function doneForNow() {
  // Flush any buffered (mid-road) answers, wait for it, then wrap up.
  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Saving your work…</span></div>`;
  flushBuffer();
  writeChain.then(() => {
    const reviewed = qIndex;
    if (hasPendingWrites() || failedWrites > 0) {
      // something didn't save — don't tell them they're safe to leave
      main.innerHTML = `
        <div class="panel">
          <h2>Some answers didn't save</h2>
          <p>${failedWrites || writeBuffer.length} ${(failedWrites || writeBuffer.length) === 1 ? 'answer' : 'answers'} couldn't be saved — likely a network hiccup. Please retry before you close the page.</p>
          <div style="margin-top:24px;display:flex;flex-direction:column;gap:10px;">
            <button class="btn-primary" onclick="retryAndWrapUp()">Retry saving</button>
            <button class="btn-secondary" onclick="loadQueue()">Keep reviewing</button>
          </div>
        </div>`;
      return;
    }
    main.innerHTML = `
      <div class="panel">
        <div class="big">${reviewed}</div>
        <h2>Thanks${MEMBER ? ', ' + esc(MEMBER.split(' ')[0]) : ''}!</h2>
        <p>You reviewed ${reviewed} ${reviewed === 1 ? 'household' : 'households'} this session. Your work is saved. Come back any time — we'll pick up where you left off.</p>
        <div style="margin-top:24px;display:flex;flex-direction:column;gap:10px;">
          <a class="btn-primary" href="index.html" style="text-decoration:none;text-align:center;">See overall progress →</a>
          <button class="btn-secondary" onclick="loadQueue()">Keep reviewing</button>
        </div>
      </div>`;
  });
}

function retryAndWrapUp() {
  failedWrites = 0;
  doneForNow();
}

function priorLabel(a) {
  return a === 'Y' ? 'Knew' : a === 'KO' ? 'Knew of' : 'Marked no';
}

// ---- Stage 1: don't know anyone (batch N for unanswered) ----
function dontKnowAnyone() {
  const hh = currentHousehold();
  if (hh.needsConfirm) {
    const remaining = hh.members.filter(m => !m.answered).length;
    const ok = confirm(`Mark the ${remaining} unreviewed ${remaining === 1 ? 'person' : 'people'} at ${hh.address} as "don't know"?`);
    if (!ok) return;
  }
  // Only write the ones not already answered (delta)
  const vanids = hh.members.filter(m => !m.answered).map(m => m.vanid);
  if (vanids.length === 0) { advance(); return; }

  // Optimistic: buffer N for each unreviewed person, advance now.
  // The buffer flushes as one batch when the road completes.
  undoStack.push(snapshotHousehold(hh, vanids));
  bufferWriteMany(vanids.map(v => ({ voterId: v, answer: "N" })));
  // mark locally so prior-answer logic stays correct if revisited
  hh.members.forEach(m => { if (!m.answered) { m.answered = true; m.priorAnswer = "N"; } });
  advance();
}

async function undoBatch(hh, vanids) {
  toast("Undoing…");
  try {
    for (const v of vanids) { await apiPost({ voterId: v, memberName: MEMBER, answer: "" }); }
    // step back one household within the road
    inRoadIndex = Math.max(0, inRoadIndex - 1);
    const road = currentRoad();
    if (road) road.done = Math.max(0, road.done - 1);
    qIndex = Math.max(0, qIndex - 1);
    stage = 1; showingRoadDone = false;
    // restore local answer flags
    hh.members.forEach(m => { if (vanids.includes(m.vanid)) { m.answered = false; m.priorAnswer = null; } });
    toast("Restored");
    renderReview();
  } catch (err) {
    toast("Couldn't undo. Reload your queue.");
  }
}

// ---- Stage 1 -> Stage 2: expand to individual review ----
function knowSomeone() {
  stage = 2;
  // Pre-populate any answers this member already gave for this household,
  // so a partial re-review starts from the existing state instead of blank.
  const hh = currentHousehold();
  stage2Answers = {};
  hh.members.forEach(m => {
    if (m.answered && m.priorAnswer) stage2Answers[m.vanid] = m.priorAnswer;
  });
  renderStage2();
}

function renderStage2() {
  const hh = currentHousehold();
  const main = document.getElementById('main');
  const road = currentRoad();

  const top = queueTopHtml(road);

  const rows = hh.members.map(m => {
    const age = (m.age || m.age === 0) ? `<span class="member-age">${m.age}</span>` : '';
    const sel = stage2Answers[m.vanid] || null;
    return `
      <div class="member-row">
        <div class="member-id">
          <span class="member-name">${esc(m.first)} ${esc(m.last)}</span>
          ${age}
        </div>
        <div class="ykn" data-vanid="${esc(m.vanid)}">
          <button data-a="Y"  class="${sel === 'Y'  ? 'sel-Y'  : ''}" onclick="pickStage2('${esc(m.vanid)}','Y',this)">Know</button>
          <button data-a="KO" class="${sel === 'KO' ? 'sel-KO' : ''}" onclick="pickStage2('${esc(m.vanid)}','KO',this)">Know of</button>
          <button data-a="N"  class="${sel === 'N'  ? 'sel-N'  : ''}" onclick="pickStage2('${esc(m.vanid)}','N',this)">No</button>
        </div>
      </div>`;
  }).join('');

  main.innerHTML = `
    ${top}
    <div class="card">
      <div class="card-head">
        <div class="card-eyebrow">Who do you know here?</div>
        <div class="card-surname">${esc(hh.surnameLabel)}</div>
        <div class="card-address">${esc(hh.address)}</div>
      </div>
      <div class="members-list">${rows}</div>
      <div class="card-actions">
        <button class="btn-primary" onclick="submitStage2()">Save &amp; continue</button>
        <button class="btn-secondary" onclick="backToStage1()">Back</button>
        <div class="card-note"><strong>Know</strong> — you know them personally. <strong>Know of</strong> — you recognize the name. <strong>No</strong> — not familiar. Leave blank to skip.</div>
      </div>
    </div>
    <div class="done-footer">
      <button class="btn-text" onclick="doneForNow()">Done for now</button>
    </div>
  `;
}

function pickStage2(vanid, answer, btn) {
  const group = btn.parentElement;
  group.querySelectorAll('button').forEach(b => {
    b.classList.remove('sel-Y','sel-KO','sel-N');
  });
  if (stage2Answers[vanid] === answer) {
    delete stage2Answers[vanid]; // tap again to clear
  } else {
    stage2Answers[vanid] = answer;
    btn.classList.add('sel-' + answer);
  }
}

function backToStage1() { stage = 1; renderReview(); }

// ============================================================
// ROAD PICKER — optional "work a specific road" entry
// ============================================================
let pickerReturn = null; // remember where we were if they cancel

function openRoadPicker() {
  // flush nothing — just show the menu over the current state
  pickerReturn = { roadIndex, inRoadIndex };
  renderRoadPicker();
}

function renderRoadPicker() {
  const main = document.getElementById('main');
  // Build from the loaded roads (already the delta queue for this member).
  // Show remaining (unreviewed) households per road, most first.
  const items = roads
    .map((r, idx) => {
      const remaining = r.households.length - r.done;
      return { idx, name: r.name, remaining, total: r.households.length };
    })
    .filter(r => r.remaining > 0)
    .sort((a, b) => b.remaining - a.remaining || a.name.localeCompare(b.name));

  const list = items.length
    ? items.map(r => `
        <button class="road-pick-row" onclick="startRoad(${r.idx})">
          <span class="road-pick-name">${esc(r.name)}</span>
          <span class="road-pick-count">${r.remaining} to review</span>
        </button>`).join('')
    : `<p class="picker-empty">No roads left to review right now.</p>`;

  main.innerHTML = `
    <div class="picker">
      <div class="picker-head">
        <h1>Pick a road</h1>
        <p>Work a specific street — a good way to rack up the people you know. Roads with the most left to review are first.</p>
      </div>
      <div class="road-pick-list">${list}</div>
      <div class="done-footer" style="margin-top:20px;">
        <button class="btn-text" onclick="closeRoadPicker()">← Back to where I was</button>
      </div>
    </div>`;
}

function startRoad(idx) {
  // Jump the queue to the chosen road, at its first unreviewed household.
  // (Households are address-ordered; done-count tracks progress, but a
  //  picked road may have prior answers — start at the first unanswered.)
  roadIndex = idx;
  const road = currentRoad();
  // find first household in this road with an unanswered member
  let start = 0;
  for (let i = 0; i < road.households.length; i++) {
    if (road.households[i].members.some(m => !m.answered)) { start = i; break; }
  }
  inRoadIndex = start;
  stage = 1;
  stage2Answers = {};
  undoStack = []; // jumping roads invalidates the current undo chain
  pickerReturn = null;
  renderReview();
}

function closeRoadPicker() {
  if (pickerReturn) {
    roadIndex = pickerReturn.roadIndex;
    inRoadIndex = pickerReturn.inRoadIndex;
    pickerReturn = null;
  }
  stage = 1;
  renderReview();
}

function submitStage2() {
  const hh = currentHousehold();

  // Diff the chosen answers against each member's prior state. Write only
  // what changed: new/changed answers, and clears (prior existed, now blank).
  const changes = []; // [{voterId, answer}]  answer "" means clear
  hh.members.forEach(m => {
    const prior = (m.answered && m.priorAnswer) ? m.priorAnswer : "";
    const chosen = stage2Answers[m.vanid] || "";
    if (chosen !== prior) changes.push({ voterId: m.vanid, answer: chosen });
  });

  if (changes.length === 0) {
    // nothing changed — just move on without a redundant write
    advance();
    return;
  }

  // Optimistic: buffer each change, advance now. Flushes per road.
  const affected = changes.map(c => c.voterId);
  undoStack.push(snapshotHousehold(hh, affected));
  changes.forEach(({ voterId, answer }) => {
    bufferWrite(voterId, answer);
    const m = hh.members.find(x => x.vanid === voterId);
    if (m) {
      if (answer === "") { m.answered = false; m.priorAnswer = null; }
      else { m.answered = true; m.priorAnswer = answer; }
    }
  });
  advance();
}

// ---- advance within the road; roll straight into the next road ----
function advance() {
  const road = currentRoad();
  if (road) road.done++;
  qIndex++;
  stage = 1;
  stage2Answers = {};
  inRoadIndex++;
  if (road && inRoadIndex >= road.households.length) {
    // Road complete: flush this road's buffered answers as ONE batch,
    // then flash a banner and roll into the next road (no stop cue).
    flushBuffer();
    undoStack = []; // answers are now sent — past cards no longer undoable
    const finishedName = road.name;
    const finishedTotal = road.total;
    roadIndex++;
    inRoadIndex = 0;
    if (roadIndex < roads.length) {
      flashRoadBanner(finishedName, finishedTotal);
    }
  }
  renderReview();
}

// Transient "road complete" banner as a fixed top overlay — it floats
// above the layout so the card and its buttons never move.
let pendingBanner = null;
let roadBannerTimer = null;
function flashRoadBanner(name, total) {
  pendingBanner = { name, total };
}
function showRoadBannerOverlay(name, total, nextName) {
  let el = document.getElementById('road-banner-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'road-banner-overlay';
    el.className = 'road-banner-overlay';
    document.body.appendChild(el);
  }
  el.textContent = `✓ ${name} complete — ${total} ${total === 1 ? 'household' : 'households'}. On to ${nextName}.`;
  el.classList.remove('hide');
  // force reflow so the show animation restarts each time
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(roadBannerTimer);
  roadBannerTimer = setTimeout(() => {
    el.classList.remove('show');
    el.classList.add('hide');
  }, 2800);
}

function disableCardButtons() {
  document.querySelectorAll('.card-actions button').forEach(b => b.disabled = true);
}
function enableCardButtons() {
  document.querySelectorAll('.card-actions button').forEach(b => b.disabled = false);
}

// ============================================================
// I MET SOMEONE — search + single write
// ============================================================
function renderMet() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="met-intro">
      <h1>Update an individual response</h1>
      <p>Need to change or add a single person's answer — someone you just met, or a response you want to correct? Search by name, address, or road, then mark how you know them. This updates their record right away and replaces any earlier answer.</p>
    </div>
    <div class="search-row">
      <input type="text" id="met-q" placeholder="Name, address, or road…" autocomplete="off" />
      <button class="btn-primary" onclick="doSearch()">Search</button>
    </div>
    <div id="met-results"></div>
  `;
  const input = document.getElementById('met-q');
  input.focus();
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
}

async function doSearch() {
  const q = document.getElementById('met-q').value.trim();
  const box = document.getElementById('met-results');
  if (q.length < 2) { box.innerHTML = `<div class="search-empty">Type at least two characters to search.</div>`; return; }
  box.innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Searching…</span></div>`;
  let data;
  try { data = await apiGet({ action: "search", q }); }
  catch (err) { box.innerHTML = `<div class="search-empty">Search failed. Try again.</div>`; return; }
  if (!data.success) { box.innerHTML = `<div class="search-empty">${esc(data.error || 'Search failed.')}</div>`; return; }

  if (!data.results || data.results.length === 0) {
    box.innerHTML = `<div class="search-empty">No one found for "${esc(q)}". Try a last name or a road.</div>`;
    return;
  }

  box.innerHTML = data.results.map(r => {
    const age = (r.age || r.age === 0) ? `, ${r.age}` : '';
    return `
      <div class="result" id="res-${esc(r.vanid)}">
        <div class="result-id">
          <div class="result-name">${esc(r.name)}${age}</div>
          <div class="result-meta">${esc(r.address)}</div>
        </div>
        <div class="ykn" data-vanid="${esc(r.vanid)}">
          <button data-a="Y"  onclick="metMark('${esc(r.vanid)}','Y','${esc(r.name)}',this)">Know</button>
          <button data-a="KO" onclick="metMark('${esc(r.vanid)}','KO','${esc(r.name)}',this)">Know of</button>
          <button data-a="N"  onclick="metMark('${esc(r.vanid)}','N','${esc(r.name)}',this)">No</button>
        </div>
      </div>`;
  }).join('');
}

async function metMark(vanid, answer, name, btn) {
  const group = btn.parentElement;
  group.querySelectorAll('button').forEach(b => { b.disabled = true; b.classList.remove('sel-Y','sel-KO','sel-N'); });
  btn.classList.add('sel-' + answer);
  try {
    const r = await apiPost({ voterId: vanid, memberName: MEMBER, answer });
    if (r.success) {
      const label = answer === 'Y' ? 'know' : answer === 'KO' ? 'know of' : "don't know";
      toast(`Saved — you ${label} ${name}`);
    } else {
      toast(r.error || "Couldn't save."); 
      group.querySelectorAll('button').forEach(b => b.disabled = false);
    }
  } catch (err) {
    toast("Couldn't save. Try again.");
    group.querySelectorAll('button').forEach(b => b.disabled = false);
  } finally {
    // re-enable after a beat so they can correct a mistap
    setTimeout(() => group.querySelectorAll('button').forEach(b => b.disabled = false), 600);
  }
}

// ============================================================
// TABS + shared
// ============================================================
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-review').classList.toggle('active', tab === 'review');
  document.getElementById('tab-met').classList.toggle('active', tab === 'met');
  if (tab === 'review') {
    // (re)load queue when entering review with nothing loaded yet
    if (roads.length === 0) loadQueue();
    else renderReview();
  } else {
    // leaving review with buffered work → flush it so it isn't stranded
    if (hasPendingWrites()) flushBuffer();
    renderMet();
  }
}

function showError(msg, retryFn) {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="error-state">
      <p>${esc(msg)}</p>
      <div style="margin-top:18px;"><button class="btn-secondary" style="max-width:200px;margin:0 auto;" onclick="(${retryFn ? retryFn.name : 'showGate'})()">Try again</button></div>
    </div>`;
}

// ---------- boot ----------
showGate();
</script>
